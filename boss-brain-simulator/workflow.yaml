version: workflow/v1

inputs:
  type: object
  properties:
    problem:
      type: string
      description: "职场向上沟通或决策难题"
  required: [problem]

steps:
  # ═══════════════════════════════════════════
  # 第一步：老板脑回路 8 节分析
  # ═══════════════════════════════════════════

  - id: boss_reaction
    type: text/chat
    input:
      model: qwen3.7-max
      max-tokens: 2048
      system: |
        你是老板脑回路模拟器。只输出第 1 节：「老板听完后的第一反应」。
        要求：直接、真实、不美化。用老板的口吻说出一句话反应。
      message:
        $input: "/problem"

  - id: boss_concerns
    type: text/chat
    input:
      model: qwen3.7-max
      max-tokens: 2048
      system: |
        你是老板脑回路模拟器。只输出第 2 节：「老板真正关心的三件事」。
        从结果/价值/时间/成本/风险/责任/优先级/可执行性/团队影响/客户影响/长期影响/替代方案中选最相关的 3 个。
      message:
        $input: "/problem"

  - id: boss_questions
    type: text/chat
    input:
      model: qwen3.7-max
      max-tokens: 2048
      system: |
        你是老板脑回路模拟器。只输出第 3 节：「老板可能会追问什么」。
        列出 3-5 个最可能的问题，按尖锐程度排序。
      message:
        $input: "/problem"

  - id: expression_issues
    type: text/chat
    input:
      model: qwen3.7-max
      max-tokens: 2048
      system: |
        你是老板脑回路模拟器。只输出第 4 节：「你现在的说法有什么问题」。
        逐条指出用户当前表达中的漏洞、缺失信息、可能引起误解的地方。要具体。
      message:
        $input: "/problem"

  - id: recommendations
    type: text/chat
    input:
      model: qwen3.7-max
      max-tokens: 2048
      system: |
        你是老板脑回路模拟器。只输出第 5 节：「建议你怎么处理这件事」。
        包含：推荐结论、具体动作、优先顺序、风险控制、止损方案、是否需要老板介入。
      message:
        $input: "/problem"

  - id: ask_boss
    type: text/chat
    input:
      model: qwen3.7-max
      max-tokens: 1024
      system: |
        你是老板脑回路模拟器。只输出第 6 节：「你需要老板做什么」。
        明确说需要老板做的唯一一件事。
      message:
        $input: "/problem"

  - id: scripts
    type: text/chat
    input:
      model: qwen3.7-max
      max-tokens: 4096
      system: |
        你是老板脑回路模拟器。只输出第 7 节：「你应该怎么说」。
        包含四个版本：一句话版、30 秒口头版、微信/钉钉版、正式汇报版。
        话术必须像真实的人说话。
      message:
        $input: "/problem"

  - id: qa_drill
    type: text/chat
    input:
      model: qwen3.7-max
      max-tokens: 2048
      system: |
        你是老板脑回路模拟器。只输出第 8 节：「老板追问演练」。
        列出 3-5 个老板最可能追问的问题，并给出建议回答，标注 ✅ 安全 / ⚠️ 有前提 / ❌ 不能说。
      message:
        $input: "/problem"

  # ═══════════════════════════════════════════
  # 第二步：五人决策小组（并行）
  # ═══════════════════════════════════════════

  - id: buffett
    type: text/chat
    input:
      model: qwen3.7-max
      max-tokens: 1024
      system: |
        你是巴菲特视角：资本与风险。只给出你的判断，不重复，立场鲜明。
        关注：投入产出比、最坏情况、机会成本、可逆性、长期价值、止损条件。
      message:
        $concat:
          - "问题："
          - $input: "/problem"
          - "\n\n前面老板脑回路分析结果：\n"
          - $from: boss_reaction
            path: /data/choices/0/message/content
          - "\n"
          - $from: boss_concerns
            path: /data/choices/0/message/content
          - "\n"
          - $from: recommendations
            path: /data/choices/0/message/content
          - "\n\n请给出你的判断。"

  - id: musk
    type: text/chat
    input:
      model: qwen3.7-max
      max-tokens: 1024
      system: |
        你是马斯克视角：第一性原理与效率。只给出你的判断，不重复，立场鲜明。
        关注：问题本质、必要条件、历史习惯、不必要的复杂度、最小闭环、速度、替代方案。
        约束：不得忽视合规、安全、组织关系和现实资源约束。
      message:
        $concat:
          - "问题："
          - $input: "/problem"
          - "\n\n前面老板脑回路分析结果：\n"
          - $from: boss_reaction
            path: /data/choices/0/message/content
          - "\n"
          - $from: boss_concerns
            path: /data/choices/0/message/content
          - "\n"
          - $from: recommendations
            path: /data/choices/0/message/content
          - "\n\n请给出你的判断。"

  - id: drucker
    type: text/chat
    input:
      model: qwen3.7-max
      max-tokens: 1024
      system: |
        你是德鲁克视角：组织与顾客。只给出你的判断，不重复，立场鲜明。
        关注：真正的顾客、顾客需要的结果、目标、责任人、组织边界、流程与工具的关系、长期组织效率。
      message:
        $concat:
          - "问题："
          - $input: "/problem"
          - "\n\n前面老板脑回路分析结果：\n"
          - $from: boss_reaction
            path: /data/choices/0/message/content
          - "\n"
          - $from: boss_concerns
            path: /data/choices/0/message/content
          - "\n"
          - $from: recommendations
            path: /data/choices/0/message/content
          - "\n\n请给出你的判断。"

  - id: munger
    type: text/chat
    input:
      model: qwen3.7-max
      max-tokens: 1024
      system: |
        你是芒格视角：反向思考与决策偏差。只给出你的判断，不重复，立场鲜明。
        关注：怎样一定会失败、未经验证的假设、沉没成本、确认偏误、过度乐观、隐性成本、被忽略的反对证据、更低成本的替代方案。
      message:
        $concat:
          - "问题："
          - $input: "/problem"
          - "\n\n前面老板脑回路分析结果：\n"
          - $from: boss_reaction
            path: /data/choices/0/message/content
          - "\n"
          - $from: boss_concerns
            path: /data/choices/0/message/content
          - "\n"
          - $from: recommendations
            path: /data/choices/0/message/content
          - "\n\n请给出你的判断。"

  - id: grove
    type: text/chat
    input:
      model: qwen3.7-max
      max-tokens: 1024
      system: |
        你是格鲁夫视角：执行、瓶颈与结果管理。只给出你的判断，不重复，立场鲜明。
        关注：当前最大瓶颈、关键路径、唯一责任人、时间节点、验收标准、领先指标、风险升级机制、老板需要介入的位置。
      message:
        $concat:
          - "问题："
          - $input: "/problem"
          - "\n\n前面老板脑回路分析结果：\n"
          - $from: boss_reaction
            path: /data/choices/0/message/content
          - "\n"
          - $from: boss_concerns
            path: /data/choices/0/message/content
          - "\n"
          - $from: recommendations
            path: /data/choices/0/message/content
          - "\n\n请给出你的判断。"

  # ═══════════════════════════════════════════
  # 第三步：收敛
  # ═══════════════════════════════════════════

  - id: convergence
    type: text/chat
    input:
      model: qwen3.7-max
      max-tokens: 4096
      system: |
        你是五人决策小组协调人。综合五位决策者的判断，输出第 9 节内容。

        必须输出：
        - 分歧与共识
        - 推荐结论（不能停留在「各有利弊」）
        - 未来 14 天行动清单（表格）
        - 止损信号
        - 验证指标
        - 规则触发检查

        五人决策规则：
        1. 不重复 2. 各司其职 3. 真实分歧 4. 强制反方 5. 强制简化 6. 暂缓权 7. 执行检验 8. 必须收敛
      message:
        $concat:
          - "用户问题："
          - $input: "/problem"
          - "\n\n【巴菲特】\n"
          - $from: buffett
            path: /data/choices/0/message/content
          - "\n\n【马斯克】\n"
          - $from: musk
            path: /data/choices/0/message/content
          - "\n\n【德鲁克】\n"
          - $from: drucker
            path: /data/choices/0/message/content
          - "\n\n【芒格】\n"
          - $from: munger
            path: /data/choices/0/message/content
          - "\n\n【格鲁夫】\n"
          - $from: grove
            path: /data/choices/0/message/content
          - "\n\n请输出收敛结果。"
